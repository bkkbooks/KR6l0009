  - {type: variant, offset: 2302, length: 268, content: '一者謂：遍淨愛盡，上愛未盡。

      乃至四者以下至廣果乃至九百五十字宋元明宮四本大異今以宋本元本宮本對校明本別附載卷末(cf. P. 1018)乃至四者謂：梵世愛未盡。於淨四靜慮：或無，或一、二、三、四。無者謂：欲愛未盡。一者謂：欲愛盡，上愛未盡。乃至四者謂：遍淨愛盡。於無漏四靜慮：或無，或一、二、三、四。無者謂：依未至定，入正性離生。一者謂：依初靜慮，或靜慮中間，入正性離生。乃至四者謂：依第四靜慮，入正性離生。於味相應四無色：或一、二、三、四。一者謂：無所有處愛盡，上愛未盡。乃至四者謂：空無邊處愛未盡。於淨四無色：或無，或一、二、三、四。無者謂：色愛未盡。一者謂：色愛盡，上愛未盡。乃至四者謂：無所有處愛盡。於無漏三無色，皆不成就。如隨信行；隨法行，亦爾。信勝解：於味相應四靜慮：或無，或一、二、三、四。無者謂：色愛盡。一者謂：遍淨愛盡，上愛未盡。乃至四者謂：梵世愛未盡。於淨四靜慮：或無，或一、二、三、四。', 聖: ''}
